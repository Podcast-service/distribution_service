# Production overlay.
# Применяется поверх базового docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d distribution_service
#
# В прод-режиме сервис подключается к управляемой БД,
# поэтому секция postgres из base исключается (deploy.replicas: 0).

services:
  postgres:
    deploy:
      replicas: 0
    profiles:
      - never

  distribution_service:
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in prod}
      BIND_ADDR: 0.0.0.0:8788
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required in prod}
      RUST_LOG: ${RUST_LOG:-distribution_service=info,tower_http=warn,sqlx=warn}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-25}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-5}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:?AUTH_SERVICE_URL is required in prod}
      AUTH_INTERNAL_API_TOKEN: ${AUTH_INTERNAL_API_TOKEN:?AUTH_INTERNAL_API_TOKEN is required in prod}
      AUTH_CACHE_TTL_SECONDS: ${AUTH_CACHE_TTL_SECONDS:-3600}
    depends_on: []
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      replicas: 1
